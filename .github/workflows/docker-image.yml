name: Constroi a imagem e sobe no registry

on:
  push:
    branches:
      - main
      - develop
      - homolog
      - "*"
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🏷️ Definir variáveis
        run: |
          echo "BRANCH_NAME=${GITHUB_REF##*/}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: ⚙️ Configurar insecure registry
        run: |
          echo '{
            "insecure-registries": ["'${{ secrets.REGISTRY_URL }}'"]
          }' | sudo tee /etc/docker/daemon.json

          sudo systemctl restart docker

      - name: � Login no Registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ secrets.REGISTRY_URL }} \
            -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      # =========================
      # BACKEND
      # =========================
      - name: 🏗️ Build backend
        run: |
          docker build -t ${{ secrets.REGISTRY_URL }}/backend_stock:${{ env.BRANCH_NAME }}-${{ env.IMAGE_TAG }} ./backend

      - name: 📤 Push backend
        run: |
          docker push ${{ secrets.REGISTRY_URL }}/backend_stock:${{ env.BRANCH_NAME }}-${{ env.IMAGE_TAG }}

      # =========================
      # FRONTEND
      # =========================
      - name: 🏗️ Build frontend
        run: |
          docker build -t ${{ secrets.REGISTRY_URL }}/frontend_stock:${{ env.BRANCH_NAME }}-${{ env.IMAGE_TAG }} ./frontend

      - name: 📤 Push frontend
        run: |
          docker push ${{ secrets.REGISTRY_URL }}/frontend_stock:${{ env.BRANCH_NAME }}-${{ env.IMAGE_TAG }}

      # =========================
      # TAG LATEST (opcional)
      # =========================
      - name: 🔁 Tag latest (main apenas)
        if: env.BRANCH_NAME == 'main'
        run: |
          docker tag ${{ secrets.REGISTRY_URL }}/backend_stock:${{ env.BRANCH_NAME }}-${{ env.IMAGE_TAG }} ${{ secrets.REGISTRY_URL }}/backend:latest
          docker tag ${{ secrets.REGISTRY_URL }}/frontend_stock:${{ env.BRANCH_NAME }}-${{ env.IMAGE_TAG }} ${{ secrets.REGISTRY_URL }}/frontend:latest

          docker push ${{ secrets.REGISTRY_URL }}/backend:latest
          docker push ${{ secrets.REGISTRY_URL }}/frontend:latest
